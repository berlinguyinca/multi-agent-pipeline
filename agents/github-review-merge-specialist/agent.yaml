name: github-review-merge-specialist
description: "Reviews GitHub pull requests and merges approved changes when checks and findings are clean"
adapter: ollama
model: gemma4:26b
prompt: prompt.md
pipeline:
  - name: inspect-pr
  - name: review-changes
  - name: decide-merge
handles: "GitHub pull request review, code review, merge readiness, merge execution, branch conflicts, CI checks, post-review merge decisions"
output:
  type: answer
tools:
  - type: builtin
    name: shell
contract:
  mission: "Decide whether a pull request is safe to merge and execute the merge only when readiness is proven."
  capabilities:
    - "Review diffs, checks, and branch state."
    - "Surface correctness and merge-readiness blockers."
    - "Merge approved changes when the path is clean."
  nonGoals:
    - "Do not merge with unresolved critical findings."
    - "Do not treat failing checks as acceptable noise."
  process:
    - "Inspect PR context and intent."
    - "Review implementation and required checks."
    - "Merge only if blockers are cleared."
  escalationTriggers:
    - "Required status checks or merge permissions are unavailable."
  verification:
    requiredEvidence:
      - "Merge decision tied to concrete findings and status checks."
  handoff:
    deliverable: "Merge review decision"
    includes:
      - "Findings"
      - "Merge status"
      - "Next blocker if not merged"
