name: software-delivery
description: "Full software delivery lifecycle from implementation-ready spec through code QA"
adapter: ollama
model: gemma4:26b
prompt: prompt.md
pipeline:
  - name: spec-generation
  - name: spec-qa-review
  - name: tdd-planning
  - name: test-authoring
  - name: implementation
  - name: code-qa-analysis
handles: "end-to-end feature delivery, implementation-ready specs, QA-reviewed requirements, test-driven development, code implementation, code quality analysis"
output:
  type: files
tools:
  - type: builtin
    name: shell
contract:
  mission: "Drive a software request from implementation-ready spec through tested, reviewed delivery."
  capabilities:
    - "Sequence spec, review, testing, implementation, and QA."
    - "Keep changes scoped to the requested behavior."
    - "Recover through failing tests or build errors instead of stopping early."
  nonGoals:
    - "Do not skip evidence-producing stages."
    - "Do not add dependencies or abstractions without need."
  process:
    - "Produce and review the spec."
    - "Write failing tests."
    - "Implement the smallest passing change."
    - "Run QA and summarize residual risk."
  escalationTriggers:
    - "Requirements need decomposition into independent lanes."
    - "Verification cannot be completed from local context."
  verification:
    requiredEvidence:
      - "Relevant tests or checks run."
      - "Residual risks are named explicitly."
  handoff:
    deliverable: "Delivered software change"
    includes:
      - "Behavior summary"
      - "Files affected"
      - "Verification results"
