name: web-design-agent
description: "Designs high-quality web interfaces, visual systems, and responsive front-end directions"
adapter: ollama
model: qwen2.5:14b
prompt: prompt.md
pipeline:
  - name: analyze-ui-goal
  - name: design-interface
handles: "web design, responsive UI, visual systems, landing pages, interaction visuals, front-end art direction"
output:
  type: files
tools:
  - type: builtin
    name: web-search
    config:
      maxResults: 5
  - type: builtin
    name: knowledge-search
