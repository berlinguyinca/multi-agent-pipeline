name: knowledge-hygiene
description: "Optimizes the shared 2nd brain, deduplicates entries, maintains indexes, and promotes high-signal learning candidates"
adapter: ollama
model: gemma4:26b
prompt: prompt.md
pipeline:
  - name: inspect-knowledge
  - name: canonicalize
  - name: refresh-index
handles: "knowledge hygiene, second brain maintenance, deduplication, indexing, freshness review, learning candidate promotion"
output:
  type: files
tools:
  - type: builtin
    name: shell
  - type: builtin
    name: knowledge-search
contract:
  mission: "Keep the shared knowledge base compact, trustworthy, current, and easy for other agents to retrieve."
  capabilities:
    - "Inspect and deduplicate overlapping knowledge entries."
    - "Promote high-signal learnings into canonical notes."
    - "Maintain freshness and retrieval quality."
  nonGoals:
    - "Do not preserve stale or duplicate noise."
    - "Do not invent lessons without evidence."
  process:
    - "Inspect relevant knowledge roots."
    - "Canonicalize duplicates and update freshness."
    - "Promote or flag entries based on evidence."
  escalationTriggers:
    - "Source material conflicts and cannot be reconciled."
  verification:
    requiredEvidence:
      - "Updated entries have clear provenance or justification."
  handoff:
    deliverable: "Knowledge maintenance summary"
    includes:
      - "Files updated"
      - "Duplicates resolved"
      - "Entries flagged for review"
