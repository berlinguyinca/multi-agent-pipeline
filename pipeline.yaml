# MAP Pipeline Configuration
# Copy this to pipeline.yaml in your project root or ~/.map/pipeline.yaml

agents:
  spec:
    adapter: claude          # claude | codex | ollama
    # model: deepseek-coder  # required for ollama, ignored for others
  review:
    adapter: codex
  qa:
    adapter: ollama
    model: qwen              # used for spec QA and code QA
  execute:
    adapter: ollama
    model: gemma4:26b        # implementation and QA-driven fixes
  docs:
    adapter: claude          # final Markdown documentation update

router:
  adapter: ollama
  model: gemma4:26b
  maxSteps: 10
  maxStepRetries: 3         # Number of retry attempts after the first timeout/failure
  stepTimeoutMs: 5m         # Initial per-step timeout; timeout retries double this budget each attempt
  timeoutMs: 30s
  consensus:
    enabled: true           # Always run router planning through consensus
    models: []              # Empty repeats router.model three times; list up to 3 models to diversify
    scope: router
    mode: majority

adapterDefaults:
  ollama:
    think: false
    temperature: 0          # Deterministic local model sampling
    seed: 42

agentConsensus:
  enabled: true             # Repeat non-file agent outputs and select the consensus candidate
  runs: 3
  outputTypes: [answer, data, presentation]
  minSimilarity: 0.35
  fileOutputs:
    enabled: true           # Run file-producing candidates in isolated git worktrees when possible
    runs: 3
    isolation: git-worktree
    keepWorktreesOnFailure: true
    verificationCommands:
      - npm run typecheck
      - npm run test:core
    selection: best-passing-minimal-diff

agentCreation:
  adapter: ollama
  model: gemma4:26b

agentOverrides:
  implementation-coder:
    model: gemma4:26b
  release-readiness-reviewer:
    enabled: true

ollama:
  host: http://localhost:11434

quality:
  maxSpecQaIterations: 3
  maxCodeQaIterations: 3

headless:
  totalTimeoutMs: 60m
  inactivityTimeoutMs: 10m
  pollIntervalMs: 10s

# Output directory for generated projects
outputDir: ./output

# Auto-commit at stage boundaries for cancel/resume
gitCheckpoints: true

# Generate pipeline execution summary at the end
generateAgentSummary: true   # Generate AGENTS_SUMMARY.md after each pipeline completes
